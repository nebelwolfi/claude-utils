<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;
  --muted:#8b949e;--accent:#58a6ff;--card:#1c2128;--card-hover:#21262d;
  --red:#f85149;--orange:#d29922;--green:#3fb950;--purple:#bc8cff;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);overflow-x:auto}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px}
header h1{font-size:20px;font-weight:600}
header .stats{color:var(--muted);font-size:13px}
.board{display:flex;gap:16px;padding:16px 24px;min-height:calc(100vh - 65px);align-items:flex-start}
.column{background:var(--surface);border:1px solid var(--border);border-radius:8px;min-width:280px;max-width:320px;flex:1;display:flex;flex-direction:column}
.column-header{padding:12px 16px;font-weight:600;font-size:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.column-header .count{background:var(--border);border-radius:10px;padding:2px 8px;font-size:12px;font-weight:400}
.column-body{padding:8px;min-height:60px;flex:1}
.column-body.drag-over{background:rgba(88,166,255,0.06);border-radius:0 0 8px 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:grab;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card.dragging{opacity:0.4}
.card-title{font-size:13px;font-weight:500;margin-bottom:4px;word-break:break-word}
.card-meta{display:flex;flex-wrap:wrap;gap:4px;font-size:11px}
.card-meta span{padding:1px 6px;border-radius:3px;background:var(--border);color:var(--muted)}
.prio-critical{color:var(--red)!important;border-color:var(--red)}
.prio-high{color:var(--orange)!important;border-color:var(--orange)}
.prio-low{color:var(--muted)!important}
.tag{background:#1f3a5f!important;color:var(--accent)!important}
.subtask-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.subtask-bar .fill{height:100%;background:var(--green);transition:width .2s}
.add-btn{width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:13px;margin-top:2px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;justify-content:center;align-items:flex-start;padding-top:80px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:560px;max-height:80vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;margin-bottom:16px}
.modal label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.5px}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit}
.modal textarea{min-height:80px;resize:vertical}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:6px;border:none;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:0.9}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--muted)}
.subtask-list{list-style:none;margin-top:4px}
.subtask-list li{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px}
.subtask-list input[type=checkbox]{width:auto}
.relations-list{font-size:13px;color:var(--muted);margin-top:4px}
.relations-list span{color:var(--accent);cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:10px 16px;border-radius:6px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.toast.error{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<header>
  <h1 id="board-name">Kanban Board</h1>
  <span class="stats" id="board-stats"></span>
</header>
<div class="board" id="board"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let board = { name: '', columns: [], tasks: [] };

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2500);
}

function prioClass(p) {
  if (p === 'critical' || p === 'high' || p === 'low') return 'prio-' + p;
  return '';
}

function renderCard(task) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.dataset.id = task.id;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('click', () => openTask(task.id));

  let meta = '';
  if (task.priority !== 'medium')
    meta += `<span class="${prioClass(task.priority)}">${task.priority}</span>`;
  if (task.assignee)
    meta += `<span>@${esc(task.assignee)}</span>`;
  for (const t of task.tags)
    meta += `<span class="tag">${esc(t)}</span>`;

  let subtaskBar = '';
  if (task.subtasks && task.subtasks.length > 0) {
    const done = task.subtasks.filter(s => s.completed).length;
    const pct = Math.round((done / task.subtasks.length) * 100);
    meta += `<span>${done}/${task.subtasks.length}</span>`;
    subtaskBar = `<div class="subtask-bar"><div class="fill" style="width:${pct}%"></div></div>`;
  }

  div.innerHTML = `<div class="card-title">${esc(task.title)}</div>`
    + (meta ? `<div class="card-meta">${meta}</div>` : '')
    + subtaskBar;
  return div;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  document.getElementById('board-name').textContent = board.name;
  const total = board.tasks.length;
  document.getElementById('board-stats').textContent = total ? `${total} task${total !== 1 ? 's' : ''}` : '';

  const container = document.getElementById('board');
  container.innerHTML = '';

  for (const col of board.columns) {
    const tasks = board.tasks.filter(t => t.column === col);
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.innerHTML = `<div class="column-header"><span>${esc(col)}</span><span class="count">${tasks.length}</span></div>`;

    const body = document.createElement('div');
    body.className = 'column-body';
    body.dataset.column = col;
    body.addEventListener('dragover', onDragOver);
    body.addEventListener('dragleave', onDragLeave);
    body.addEventListener('drop', onDrop);

    for (const t of tasks) body.appendChild(renderCard(t));

    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Add task';
    addBtn.addEventListener('click', () => openCreateModal(col));
    body.appendChild(addBtn);

    colEl.appendChild(body);
    container.appendChild(colEl);
  }
}

let dragId = null;
function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  dragId = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const col = e.currentTarget.dataset.column;
  const cards = [...e.currentTarget.querySelectorAll('.card')];
  const afterEl = cards.find(c => {
    const box = c.getBoundingClientRect();
    return e.clientY < box.top + box.height / 2;
  });
  const position = afterEl ? cards.indexOf(afterEl) : undefined;
  try {
    await api(`/tasks/${dragId}/move`, { method: 'POST', body: { column: col, position } });
    await refresh();
  } catch (err) { toast(err.message, true); }
}

async function refresh() {
  try {
    board = await api('/board');
    render();
  } catch (err) { toast('Failed to load board: ' + err.message, true); }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function openCreateModal(column) {
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h2>New Task</h2>
    <label>Title</label><input id="f-title" autofocus>
    <label>Description</label><textarea id="f-desc"></textarea>
    <label>Priority</label>
    <select id="f-prio"><option>low</option><option selected>medium</option><option>high</option><option>critical</option></select>
    <label>Assignee</label><input id="f-assignee">
    <label>Tags (comma-separated)</label><input id="f-tags">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="f-submit">Create</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);

  document.getElementById('f-submit').addEventListener('click', async () => {
    const title = document.getElementById('f-title').value.trim();
    if (!title) return toast('Title is required', true);
    const body = {
      title,
      column,
      description: document.getElementById('f-desc').value,
      priority: document.getElementById('f-prio').value,
      assignee: document.getElementById('f-assignee').value.trim(),
      tags: document.getElementById('f-tags').value.split(',').map(s => s.trim()).filter(Boolean),
    };
    try {
      await api('/tasks', { method: 'POST', body });
      closeModal();
      await refresh();
      toast('Task created');
    } catch (err) { toast(err.message, true); }
  });
}

async function openTask(id) {
  let task;
  try { task = await api('/tasks/' + id); } catch (err) { return toast(err.message, true); }
  const modal = document.getElementById('modal');

  function renderInner() {
    const subtasksHtml = task.subtasks.length ? '<label>Subtasks</label><ul class="subtask-list">'
      + task.subtasks.map((s, i) =>
        `<li><input type="checkbox" data-idx="${i}" ${s.completed ? 'checked' : ''}><span>${esc(s.text)}</span></li>`
      ).join('') + '</ul>' : '';

    const relationsHtml = task.relations.length ? '<label>Relations</label><div class="relations-list">'
      + task.relations.map(r => `<span data-id="${esc(r.taskId)}">${esc(r.type)} ${esc(r.taskId)}</span>`).join('<br>') + '</div>' : '';

    modal.innerHTML = `
      <h2>${esc(task.title)}</h2>
      <label>Title</label><input id="e-title" value="${esc(task.title)}">
      <label>Description</label><textarea id="e-desc">${esc(task.description)}</textarea>
      <label>Priority</label>
      <select id="e-prio">${['low','medium','high','critical'].map(p => `<option${p===task.priority?' selected':''}>${p}</option>`).join('')}</select>
      <label>Assignee</label><input id="e-assignee" value="${esc(task.assignee)}">
      <label>Tags</label><input id="e-tags" value="${esc(task.tags.join(', '))}">
      <label>Column</label>
      <select id="e-column">${board.columns.map(c => `<option${c===task.column?' selected':''}>${esc(c)}</option>`).join('')}</select>
      ${subtasksHtml}
      ${relationsHtml}
      <div class="modal-actions">
        <button class="btn btn-danger" id="e-delete">Delete</button>
        <span style="flex:1"></span>
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="e-save">Save</button>
      </div>`;

    modal.querySelectorAll('.subtask-list input').forEach(cb => {
      cb.addEventListener('change', async () => {
        const idx = parseInt(cb.dataset.idx);
        try {
          task = await api(`/tasks/${id}/subtask`, { method: 'POST', body: { action: 'toggle', index: idx } });
          renderInner();
        } catch (err) { toast(err.message, true); }
      });
    });

    modal.querySelectorAll('.relations-list span').forEach(el => {
      el.addEventListener('click', () => { closeModal(); openTask(el.dataset.id); });
    });

    document.getElementById('e-save').addEventListener('click', async () => {
      const updates = {
        title: document.getElementById('e-title').value.trim(),
        description: document.getElementById('e-desc').value,
        priority: document.getElementById('e-prio').value,
        assignee: document.getElementById('e-assignee').value.trim(),
        tags: document.getElementById('e-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      };
      const newCol = document.getElementById('e-column').value;
      try {
        await api(`/tasks/${id}`, { method: 'PUT', body: updates });
        if (newCol !== task.column) await api(`/tasks/${id}/move`, { method: 'POST', body: { column: newCol } });
        closeModal();
        await refresh();
        toast('Task saved');
      } catch (err) { toast(err.message, true); }
    });

    document.getElementById('e-delete').addEventListener('click', async () => {
      if (!confirm('Delete this task?')) return;
      try {
        await api(`/tasks/${id}`, { method: 'DELETE' });
        closeModal();
        await refresh();
        toast('Task deleted');
      } catch (err) { toast(err.message, true); }
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
  renderInner();
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
